<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>扫雷对战</title>
  <script type="module" crossorigin src="/assets/index-CLSRtF2E.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-B9jWBzA6.css">
</head>
<body>
  <div id="app">
    <div id="lobby">
      <h1>💣 扫雷对战</h1>
      <button id="create-room-btn">创建房间</button>
      <div id="join-section">
        <input id="room-id-input" type="text" placeholder="输入房间码" maxlength="6" />
        <button id="join-room-btn">加入房间</button>
      </div>
      <button id="solo-btn" class="solo-btn">单机模式</button>
    </div>

    <div id="waiting-room" style="display:none;">
      <p id="waiting-message">等待对手加入...</p>
      <p>房间码：<span id="room-code-waiting"></span></p>
    </div>

    <div id="game-ui" style="display:none;">
      <div id="info-bar">
        <span id="room-code-display">房间: -</span>
        <span id="timer">⏱ 0.0s</span>
        <span id="mine-count">💣 10</span>
        <span id="turn-indicator">--</span>
      </div>
      <div id="progress-bars">
        <div class="progress">
          <span>你</span>
          <div class="bar-bg">
            <div id="my-progress" class="bar-fill" style="width: 0%"></div>
          </div>
        </div>
        <div class="progress">
          <span>对手</span>
          <div class="bar-bg">
            <div id="opponent-progress" class="bar-fill" style="width: 0%"></div>
          </div>
        </div>
      </div>
      <div id="turn-hint" style="display:none;">请等待对手操作</div>
      <div id="game-area">
        <canvas id="game-canvas"></canvas>
      </div>
      <div id="flag-mode-bar" style="display:none;">
        <button id="flag-mode-btn" class="flag-mode-off">🚩 标记模式</button>
      </div>
      <div id="solo-difficulty-bar" style="display:none;">
        <button class="diff-btn" data-diff="easy">初级 9×9</button>
        <button class="diff-btn" data-diff="medium">中级 16×16</button>
        <button class="diff-btn" data-diff="hard">高级 16×30</button>
        <button id="custom-toggle-btn" class="diff-btn">自定义</button>
      </div>
      <div id="custom-difficulty-panel" style="display:none;">
        <label>行: <input id="custom-rows" type="number" min="5" max="30" value="9" /></label>
        <label>列: <input id="custom-cols" type="number" min="5" max="40" value="9" /></label>
        <label>雷: <input id="custom-mines" type="number" min="1" max="500" value="10" /></label>
        <button id="custom-start-btn">开始</button>
        <button id="custom-cancel-btn">取消</button>
      </div>
    </div>
  </div>

  <div id="game-over-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2 id="result-title"></h2>
      <p id="result-detail"></p>
      <div id="rematch-status" style="display:none; color:#666; margin-top:10px;"></div>
      <div class="modal-buttons">
        <button id="modal-rematch-btn">再来一局</button>
        <button id="modal-cancel-rematch-btn">取消投票</button>
        <button id="back-lobby-btn">返回大厅</button>
      </div>
    </div>
  </div>

  <div id="create-room-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>选择难度</h2>
      <div id="create-diff-bar">
        <button class="diff-btn" data-diff="easy">初级 9×9 / 10雷</button>
        <button class="diff-btn" data-diff="medium">中级 16×16 / 40雷</button>
        <button class="diff-btn" data-diff="hard">高级 16×30 / 99雷</button>
        <button id="create-custom-toggle" class="diff-btn">自定义</button>
      </div>
      <div id="create-custom-panel" style="display:none;">
        <label>行: <input id="create-custom-rows" type="number" min="5" max="30" value="9" /></label>
        <label>列: <input id="create-custom-cols" type="number" min="5" max="50" value="9" /></label>
        <label>雷: <input id="create-custom-mines" type="number" min="1" max="500" value="10" /></label>
      </div>
      <p id="create-diff-error" class="error-msg" style="display:none;"></p>
      <div class="modal-buttons">
        <button id="create-confirm-btn">确认创建</button>
        <button id="create-cancel-btn">取消</button>
      </div>
    </div>
  </div>

  <div id="solo-result-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2 id="solo-result-title"></h2>
      <p id="solo-result-detail"></p>
      <div class="modal-buttons">
        <button id="solo-restart-btn">再来一局</button>
        <button id="solo-lobby-btn">返回大厅</button>
      </div>
    </div>
  </div>

  <div id="toast" style="display:none;"></div>

</body>
</html>
